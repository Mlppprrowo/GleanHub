name: Daily Trending Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run scraper
        run: node scraper.js

      - name: Commit trending.json
        run: |
          git config user.name "GleanHub Bot"
          git config user.email "bot@gleanhub"
          git fetch origin main
          git reset --hard origin/main
          node scraper.js
          git add trending.json
          git diff --cached --quiet || git commit -m "Update trending $(date +'%Y-%m-%d')"
          git push origin main
